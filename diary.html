<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>振り返り日記</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1714;
  --ink-light: #4a4540;
  --ink-faint: #8a847e;
  --paper: #faf7f2;
  --paper-warm: #f2ede4;
  --paper-border: #e0d8cc;
  --accent: #8b4e2a;
  --accent-light: #c4855a;
  --ai-bg: #f0ece4;
  --ai-border: #c8bfb0;
  --success: #3a6e4e;
  --entry-bg: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.8;
}
.layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  min-height: 100vh;
}

/* サイドバー */
.sidebar {
  background: var(--paper-warm);
  border-right: 1px solid var(--paper-border);
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.sidebar-header {
  padding: 1.5rem;
  border-bottom: 1px solid var(--paper-border);
}
.app-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 20px;
  font-weight: 500;
  letter-spacing: 0.1em;
}
.app-subtitle {
  font-size: 10px;
  color: var(--ink-faint);
  margin-top: 3px;
  letter-spacing: 0.05em;
}

/* ストリーク */
.streak-bar {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--paper-border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.streak-num {
  font-family: 'Shippori Mincho', serif;
  font-size: 32px;
  font-weight: 600;
  color: var(--accent);
  line-height: 1;
}
.streak-label { font-size: 11px; color: var(--ink-faint); }
.streak-label strong { display: block; font-size: 13px; color: var(--ink-light); font-weight: 500; }

/* カレンダー */
.calendar-wrap {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--paper-border);
}
.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.cal-nav button {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--ink-faint);
  font-size: 16px;
  padding: 2px 6px;
  border-radius: 4px;
}
.cal-nav button:hover { background: var(--paper-border); }
.cal-month {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-light);
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}
.cal-dow {
  font-size: 10px;
  color: var(--ink-faint);
  text-align: center;
  padding: 3px 0;
}
.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  border-radius: 50%;
  cursor: pointer;
  color: var(--ink-light);
  position: relative;
}
.cal-day:hover { background: rgba(139,78,42,0.08); }
.cal-day.other-month { pointer-events: none; }
.cal-day.has-entry {
  background: var(--accent);
  color: #faf7f2;
  cursor: pointer;
  font-weight: 500;
}
.cal-day.has-entry:hover { background: #7a4325; }
.cal-day.today {
  border: 1.5px solid var(--accent-light);
}
.cal-day.today.has-entry { border-color: transparent; }
.cal-day.other-month { color: var(--paper-border); }
.cal-day.selected { box-shadow: 0 0 0 2px var(--accent-light); }

/* 気分グラフ */
.mood-section {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--paper-border);
}
.mood-title {
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.mood-chart {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 50px;
}
.mood-bar-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  height: 100%;
  justify-content: flex-end;
  cursor: pointer;
}
.mood-bar {
  width: 100%;
  border-radius: 2px 2px 0 0;
  background: var(--accent-light);
  min-height: 2px;
  transition: background 0.2s;
}
.mood-bar-wrap:hover .mood-bar { background: var(--accent); }
.mood-bar-wrap.active .mood-bar { background: var(--accent); }
.mood-bar-label { font-size: 8px; color: var(--ink-faint); }

/* エントリリスト */
.new-btn {
  margin: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--accent);
  color: #faf7f2;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.05em;
  transition: background 0.2s;
}
.new-btn:hover { background: #7a4325; }
.entries-list { flex: 1; overflow-y: auto; padding-bottom: 1rem; }
.entries-label {
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0 1.5rem;
  margin-bottom: 6px;
}
.entry-item {
  padding: 8px 1.5rem;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.entry-item:hover { background: rgba(139,78,42,0.06); }
.entry-item.active { background: rgba(139,78,42,0.08); border-left-color: var(--accent); }
.entry-mood-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.entry-info { flex: 1; min-width: 0; }
.entry-date { font-size: 12px; font-weight: 500; color: var(--ink-light); }
.entry-preview { font-size: 11px; color: var(--ink-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* メイン */
.main {
  padding: 3rem 4rem;
  max-width: 800px;
  padding-bottom: 6rem;
}
.date-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 2rem;
}
.date-display {
  font-family: 'Shippori Mincho', serif;
  font-size: 26px;
  font-weight: 500;
  letter-spacing: 0.05em;
}
.date-day { font-size: 14px; color: var(--ink-faint); }
.saved-badge { font-size: 11px; color: var(--success); display: none; }
.saved-badge.show { display: inline; }

/* 気分スコア入力 */
.mood-input-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 2rem;
  padding: 14px 16px;
  background: var(--entry-bg);
  border: 1px solid var(--paper-border);
  border-radius: 6px;
}
.mood-input-label { font-size: 12px; color: var(--ink-faint); white-space: nowrap; }
.mood-stars { display: flex; gap: 6px; }
.mood-star {
  font-size: 22px;
  cursor: pointer;
  opacity: 0.25;
  transition: opacity 0.15s, transform 0.1s;
  user-select: none;
  line-height: 1;
}
.mood-star.active { opacity: 1; }
.mood-star:hover { transform: scale(1.2); }
.mood-score-text { font-size: 11px; color: var(--ink-faint); margin-left: 4px; }

/* セクション */
.section { margin-bottom: 1.75rem; }
.section-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.section-label .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-light);
  flex-shrink: 0;
}
textarea {
  width: 100%;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  line-height: 1.8;
  color: var(--ink);
  background: var(--entry-bg);
  border: 1px solid var(--paper-border);
  border-radius: 6px;
  padding: 14px 16px;
  resize: vertical;
  min-height: 90px;
  outline: none;
  transition: border-color 0.2s;
  caret-color: var(--accent);
}
textarea:focus { border-color: var(--accent-light); }
textarea::placeholder { color: var(--ink-faint); }

/* タグ */
.tags-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 1.75rem;
  align-items: center;
}
.tag-label { font-size: 11px; color: var(--ink-faint); margin-right: 4px; }
.tag {
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--paper-border);
  background: var(--entry-bg);
  font-size: 12px;
  color: var(--ink-light);
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.tag:hover { border-color: var(--accent-light); color: var(--accent); }
.tag.selected { background: var(--accent); color: #faf7f2; border-color: var(--accent); }

/* 検索 */
.search-wrap {
  padding: 0.75rem 1.5rem;
  border-bottom: 1px solid var(--paper-border);
}
.search-input {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--paper-border);
  border-radius: 4px;
  font-size: 12px;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  outline: none;
}
.search-input:focus { border-color: var(--accent-light); }

/* アクション */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 1.5rem;
  align-items: center;
  flex-wrap: wrap;
}
.btn-save {
  padding: 10px 22px;
  background: var(--accent);
  color: #faf7f2;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.08em;
  transition: background 0.2s;
}
.btn-save:hover { background: #7a4325; }
.btn-ai {
  padding: 10px 18px;
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent-light);
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.08em;
  transition: all 0.2s;
}
.btn-ai:hover { background: rgba(139,78,42,0.06); }
.btn-delete {
  margin-left: auto;
  padding: 10px 14px;
  background: transparent;
  color: var(--ink-faint);
  border: 1px solid var(--paper-border);
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  transition: all 0.2s;
}
.btn-delete:hover { color: #c0392b; border-color: #c0392b; }

/* 1ヶ月前バナー */
.one-month-ago {
  margin-bottom: 1.5rem;
  padding: 12px 16px;
  background: #f5f0e8;
  border: 1px solid var(--paper-border);
  border-left: 3px solid var(--accent-light);
  border-radius: 6px;
  font-size: 13px;
  color: var(--ink-light);
  display: none;
}
.one-month-ago.visible { display: block; }
.one-month-ago-title { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-light); margin-bottom: 4px; }

/* AIコメント */
.ai-comment {
  margin-top: 2rem;
  border-top: 1px solid var(--paper-border);
  padding-top: 1.75rem;
  display: none;
}
.ai-comment.visible { display: block; }
.ai-label {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ai-label::before {
  content: '';
  display: inline-block;
  width: 20px; height: 1px;
  background: var(--ink-faint);
}
.ai-bubble {
  background: var(--ai-bg);
  border: 1px solid var(--ai-border);
  border-radius: 8px;
  padding: 1.25rem 1.5rem;
  font-size: 14px;
  line-height: 1.9;
  color: var(--ink-light);
  white-space: pre-wrap;
}
.loading-dots { display: inline-flex; gap: 4px; align-items: center; }
.loading-dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--ink-faint);
  animation: blink 1.2s infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0.2}40%{opacity:1} }

/* 月次サマリー */
.monthly-summary {
  margin-top: 2rem;
  padding: 1.5rem;
  background: var(--ai-bg);
  border: 1px solid var(--ai-border);
  border-radius: 8px;
  font-size: 14px;
  line-height: 1.9;
  color: var(--ink-light);
  display: none;
}
.monthly-summary.visible { display: block; }
.monthly-summary-title {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent-light);
  margin-bottom: 10px;
}

/* 空の状態 */
.empty-state {
  padding: 5rem 0;
  text-align: center;
  color: var(--ink-faint);
}
.empty-state .big {
  font-family: 'Shippori Mincho', serif;
  font-size: 48px;
  margin-bottom: 1rem;
  opacity: 0.3;
}
.empty-state p { font-size: 14px; }

/* APIキーバー */
.apikey-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--paper-warm);
  border-top: 1px solid var(--paper-border);
  padding: 8px 1.5rem;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  z-index: 100;
}
.apikey-bar label { color: var(--ink-faint); white-space: nowrap; }
.apikey-bar input {
  flex: 1;
  max-width: 380px;
  padding: 5px 10px;
  border: 1px solid var(--paper-border);
  border-radius: 4px;
  font-size: 12px;
  background: var(--paper);
  color: var(--ink);
  font-family: monospace;
  outline: none;
}
.apikey-status { font-size: 11px; color: var(--ink-faint); }
.apikey-status.ok { color: var(--success); }
</style>
</head>
<body>

<div class="layout">
  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="app-title">振り返り日記</div>
      <div class="app-subtitle">reflection · learning · gratitude</div>
    </div>

    <!-- ストリーク -->
    <div class="streak-bar">
      <div class="streak-num" id="streak-num">0</div>
      <div class="streak-label">
        <strong id="streak-label-text">連続記録</strong>
        日継続中
      </div>
    </div>

    <!-- カレンダー -->
    <div class="calendar-wrap">
      <div class="cal-nav">
        <button onclick="calPrev()">‹</button>
        <div class="cal-month" id="cal-month-label"></div>
        <button onclick="calNext()">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- 気分グラフ -->
    <div class="mood-section">
      <div class="mood-title">気分の推移（直近14日）</div>
      <div class="mood-chart" id="mood-chart"></div>
    </div>

    <!-- 検索 -->
    <div class="search-wrap">
      <input class="search-input" type="text" placeholder="キーワードで検索..." oninput="searchEntries(this.value)" />
    </div>

    <button class="new-btn" onclick="newEntry()">＋ 今日の記録</button>

    <div class="entries-list">
      <div class="entries-label">記録一覧</div>
      <div id="entries-list"></div>
    </div>
  </aside>

  <!-- メイン -->
  <main class="main" id="main-area">
    <div class="empty-state" id="empty-state">
      <div class="big">日</div>
      <p>「今日の記録」から始めてください</p>
    </div>

    <div id="editor" style="display:none;">
      <div class="date-header">
        <div class="date-display" id="entry-date-display"></div>
        <div class="date-day" id="entry-day-display"></div>
        <span class="saved-badge" id="saved-badge">✓ 保存済み</span>
      </div>

      <!-- 1ヶ月前 -->
      <div class="one-month-ago" id="one-month-ago">
        <div class="one-month-ago-title">1ヶ月前の今日</div>
        <div id="one-month-ago-content"></div>
      </div>

      <!-- 気分スコア -->
      <div class="mood-input-row">
        <div class="mood-input-label">今日の気分</div>
        <div class="mood-stars" id="mood-stars">
          <span class="mood-star" data-score="1" onclick="setMood(1)">●</span>
          <span class="mood-star" data-score="2" onclick="setMood(2)">●</span>
          <span class="mood-star" data-score="3" onclick="setMood(3)">●</span>
          <span class="mood-star" data-score="4" onclick="setMood(4)">●</span>
          <span class="mood-star" data-score="5" onclick="setMood(5)">●</span>
        </div>
        <div class="mood-score-text" id="mood-score-text">タップして記録</div>
      </div>

      <!-- タグ -->
      <div class="tags-row">
        <span class="tag-label">テーマ：</span>
        <span class="tag" data-tag="仕事" onclick="toggleTag(this)">仕事</span>
        <span class="tag" data-tag="家族" onclick="toggleTag(this)">家族</span>
        <span class="tag" data-tag="健康" onclick="toggleTag(this)">健康</span>
        <span class="tag" data-tag="学び" onclick="toggleTag(this)">学び</span>
        <span class="tag" data-tag="人間関係" onclick="toggleTag(this)">人間関係</span>
        <span class="tag" data-tag="その他" onclick="toggleTag(this)">その他</span>
      </div>

      <div class="section">
        <div class="section-label"><span class="dot"></span>振り返り ― 今日はどんな一日でしたか？</div>
        <textarea id="field-reflection" rows="5" placeholder="仕事・出来事・感情など、頭に浮かぶことをそのまま書いてください。"></textarea>
      </div>
      <div class="section">
        <div class="section-label"><span class="dot"></span>学び ― 気づいたこと・得たこと</div>
        <textarea id="field-learning" rows="4" placeholder="小さな気づきでも構いません。何かを「知った」「理解した」瞬間は？"></textarea>
      </div>
      <div class="section">
        <div class="section-label"><span class="dot"></span>感謝 ― ありがたかったこと</div>
        <textarea id="field-gratitude" rows="3" placeholder="人・出来事・環境・自分自身、何でも。"></textarea>
      </div>

      <div class="actions">
        <button class="btn-save" onclick="saveEntry()">保存</button>
        <button class="btn-ai" onclick="getAIComment()">✦ AIに問いかけてもらう</button>
        <button class="btn-ai" onclick="getMonthlySummary()" style="font-size:12px;">📋 今月を振り返る</button>
        <button class="btn-delete" onclick="deleteEntry()">削除</button>
      </div>

      <div class="ai-comment" id="ai-comment">
        <div class="ai-label">AIからの問いかけ</div>
        <div class="ai-bubble" id="ai-bubble"></div>
      </div>

      <div class="monthly-summary" id="monthly-summary">
        <div class="monthly-summary-title">今月の総括 — AIより</div>
        <div id="monthly-summary-content"></div>
      </div>
    </div>
  </main>
</div>

<!-- APIキーバー -->
<div class="apikey-bar">
  <label>OpenAI API Key：</label>
  <input type="password" id="apikey-input" placeholder="sk-..." oninput="saveApiKey(this.value)" />
  <span class="apikey-status" id="apikey-status">未設定</span>
</div>

<script>
const DAYS = ['日','月','火','水','木','金','土'];
const MOOD_LABELS = ['','最低','やや低め','普通','良い','最高'];
const MOOD_COLORS = ['','#c0392b','#e67e22','#8a847e','#3a6e4e','#8b4e2a'];

let entries = JSON.parse(localStorage.getItem('diary_entries') || '[]');
let currentId = null;
let currentMood = 0;
let currentTags = [];
let apiKey = localStorage.getItem('diary_apikey') || '';
let calYear, calMonth;

function init() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  if (apiKey) {
    document.getElementById('apikey-input').value = apiKey;
    document.getElementById('apikey-status').textContent = '設定済み';
    document.getElementById('apikey-status').className = 'apikey-status ok';
  }
  renderAll();
}

function saveApiKey(val) {
  apiKey = val.trim();
  localStorage.setItem('diary_apikey', apiKey);
  const s = document.getElementById('apikey-status');
  s.textContent = apiKey ? '設定済み' : '未設定';
  s.className = apiKey ? 'apikey-status ok' : 'apikey-status';
}

function save() { localStorage.setItem('diary_entries', JSON.stringify(entries)); }

function renderAll() {
  renderStreak();
  renderCalendar();
  renderMoodChart();
  renderList(entries);
}

/* ストリーク計算 */
function renderStreak() {
  const dates = new Set(entries.map(e => e.date));
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (dates.has(ds)) streak++;
    else if (i > 0) break;
  }
  document.getElementById('streak-num').textContent = streak;
  document.getElementById('streak-label-text').textContent = streak >= 7 ? '🔥 連続記録' : '連続記録';
}

/* カレンダー */
function renderCalendar() {
  const label = `${calYear}年${calMonth+1}月`;
  document.getElementById('cal-month-label').textContent = label;
  const dates = new Set(entries.map(e => e.date));
  const today = (() => { const _d = new Date(); return `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`; })();
  const grid = document.getElementById('cal-grid');
  const dows = ['日','月','火','水','木','金','土'];
  let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');
  const first = new Date(calYear, calMonth, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();
  for (let i = startDow - 1; i >= 0; i--) {
    html += `<div class="cal-day other-month">${prevDays - i}</div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasEntry = dates.has(ds);
    const isToday = ds === today;
    const isSelected = currentId && entries.find(e => e.id === currentId)?.date === ds;
    const cls = ['cal-day', hasEntry ? 'has-entry' : '', isToday ? 'today' : '', isSelected ? 'selected' : ''].filter(Boolean).join(' ');
    const click = ds >= '2020-01-01' ? `onclick="openOrCreateEntry('${ds}')"` : '';
    html += `<div class="${cls}" ${click}>${d}</div>`;
  }
  grid.innerHTML = html;
}

function calPrev() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); }
function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); }

function openEntryByDate(ds) {
  openOrCreateEntry(ds);
}
function openOrCreateEntry(ds) {
  const existing = entries.find(e => e.date === ds);
  if (existing) { openEntry(existing.id); return; }
  // 既存なし → 編集エリアだけ開く（エントリはまだ作らない）
  openDraft(ds);
}

function openDraft(ds) {
  currentId = '__draft__';
  window._draftDate = ds;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('editor').style.display = 'block';
  const d = new Date(ds + 'T00:00:00');
  document.getElementById('entry-date-display').textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  document.getElementById('entry-day-display').textContent = `（${DAYS[d.getDay()]}）`;
  document.getElementById('field-reflection').value = '';
  document.getElementById('field-learning').value = '';
  document.getElementById('field-gratitude').value = '';
  document.getElementById('saved-badge').className = 'saved-badge';
  currentMood = 0; renderMoodStars();
  currentTags = [];
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('selected'));
  document.getElementById('ai-comment').className = 'ai-comment';
  document.getElementById('monthly-summary').className = 'monthly-summary';
  document.getElementById('one-month-ago').className = 'one-month-ago';
}

/* 気分グラフ（直近14日） */
function renderMoodChart() {
  const today = new Date();
  const bars = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const e = entries.find(e => e.date === ds);
    const mood = e?.mood || 0;
    const h = mood ? (mood / 5) * 100 : 4;
    const col = mood ? MOOD_COLORS[mood] : 'var(--paper-border)';
    const label = `${d.getMonth()+1}/${d.getDate()}`;
    bars.push(`<div class="mood-bar-wrap" title="${label}${mood ? ' — '+MOOD_LABELS[mood] : ''}" onclick="openEntryByDate('${ds}')">
      <div class="mood-bar" style="height:${h}%;background:${col};"></div>
    </div>`);
  }
  document.getElementById('mood-chart').innerHTML = bars.join('');
}

/* エントリリスト */
function renderList(list) {
  const el = document.getElementById('entries-list');
  if (!list.length) { el.innerHTML = '<div style="padding:0.5rem 1.5rem;font-size:12px;color:var(--ink-faint);">記録がありません</div>'; return; }
  el.innerHTML = list.map(e => {
    const d = new Date(e.date + 'T00:00:00');
    const label = `${d.getMonth()+1}/${d.getDate()}（${DAYS[d.getDay()]}）`;
    const preview = (e.reflection || e.learning || e.gratitude || '').slice(0,28);
    const col = e.mood ? MOOD_COLORS[e.mood] : 'var(--paper-border)';
    return `<div class="entry-item${e.id === currentId ? ' active' : ''}" data-id="${e.id}" onclick="openEntry('${e.id}')">
      <div class="mood-dot" style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0;"></div>
      <div class="entry-info">
        <div class="entry-date">${label}</div>
        <div class="entry-preview">${preview || '（未記入）'}</div>
      </div>
    </div>`;
  }).join('');
}

function searchEntries(q) {
  if (!q) { renderList(entries); return; }
  const kw = q.toLowerCase();
  const filtered = entries.filter(e =>
    (e.reflection||'').toLowerCase().includes(kw) ||
    (e.learning||'').toLowerCase().includes(kw) ||
    (e.gratitude||'').toLowerCase().includes(kw) ||
    (e.tags||[]).some(t => t.toLowerCase().includes(kw))
  );
  renderList(filtered);
}

/* 新規作成 */
function newEntry() {
  const today = (() => { const _d = new Date(); return `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`; })();
  const existing = entries.find(e => e.date === today);
  if (existing) { openEntry(existing.id); return; }
  openDraft(today);
}

/* エントリを開く */
function openEntry(id) {
  currentId = id;
  const entry = entries.find(e => e.id === id);
  if (!entry) return;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('editor').style.display = 'block';
  const d = new Date(entry.date + 'T00:00:00');
  document.getElementById('entry-date-display').textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  document.getElementById('entry-day-display').textContent = `（${DAYS[d.getDay()]}）`;
  document.getElementById('field-reflection').value = entry.reflection || '';
  document.getElementById('field-learning').value = entry.learning || '';
  document.getElementById('field-gratitude').value = entry.gratitude || '';
  document.getElementById('saved-badge').className = 'saved-badge';

  // 気分
  currentMood = entry.mood || 0;
  renderMoodStars();

  // タグ
  currentTags = [...(entry.tags || [])];
  document.querySelectorAll('.tag').forEach(t => {
    t.classList.toggle('selected', currentTags.includes(t.dataset.tag));
  });

  // AIコメント
  const aiDiv = document.getElementById('ai-comment');
  const aiBubble = document.getElementById('ai-bubble');
  if (entry.aiComment) { aiBubble.textContent = entry.aiComment; aiDiv.className = 'ai-comment visible'; }
  else { aiDiv.className = 'ai-comment'; aiBubble.textContent = ''; }

  // 月次サマリー非表示
  document.getElementById('monthly-summary').className = 'monthly-summary';

  // 1ヶ月前
  const oneMonthAgo = new Date(d);
  oneMonthAgo.setMonth(oneMonthAgo.getMonth() - 1);
  const omaDate = `${oneMonthAgo.getFullYear()}-${String(oneMonthAgo.getMonth()+1).padStart(2,'0')}-${String(oneMonthAgo.getDate()).padStart(2,'0')}`;
  const omaEntry = entries.find(e => e.date === omaDate);
  const omaDiv = document.getElementById('one-month-ago');
  if (omaEntry) {
    const preview = (omaEntry.reflection || omaEntry.learning || '').slice(0, 100);
    document.getElementById('one-month-ago-content').textContent = preview + (preview.length >= 100 ? '…' : '');
    omaDiv.className = 'one-month-ago visible';
    omaDiv.style.cursor = 'pointer';
    omaDiv.onclick = () => openEntry(omaEntry.id);
  } else {
    omaDiv.className = 'one-month-ago';
  }

  // リスト・カレンダー更新
  document.querySelectorAll('.entry-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  renderCalendar();
  window.scrollTo(0, 0);
}

/* 気分 */
function setMood(score) {
  currentMood = score;
  renderMoodStars();
}
function renderMoodStars() {
  document.querySelectorAll('.mood-star').forEach(s => {
    s.classList.toggle('active', parseInt(s.dataset.score) <= currentMood);
    s.style.color = currentMood ? MOOD_COLORS[currentMood] : 'var(--ink-faint)';
  });
  const txt = document.getElementById('mood-score-text');
  txt.textContent = currentMood ? MOOD_LABELS[currentMood] : 'タップして記録';
}

/* タグ */
function toggleTag(el) {
  const tag = el.dataset.tag;
  if (currentTags.includes(tag)) { currentTags = currentTags.filter(t => t !== tag); el.classList.remove('selected'); }
  else { currentTags.push(tag); el.classList.add('selected'); }
}

/* 保存 */
function saveEntry() {
  if (!currentId) return;
  if (currentId === '__draft__') {
    // 初回保存：エントリを新規作成
    const id = 'e_' + Date.now();
    const ds = window._draftDate;
    entries.unshift({ id, date: ds, reflection: '', learning: '', gratitude: '', mood: 0, tags: [], aiComment: '' });
    entries.sort((a, b) => b.date.localeCompare(a.date));
    currentId = id;
  }
  const idx = entries.findIndex(e => e.id === currentId);
  if (idx < 0) return;
  entries[idx].reflection = document.getElementById('field-reflection').value;
  entries[idx].learning = document.getElementById('field-learning').value;
  entries[idx].gratitude = document.getElementById('field-gratitude').value;
  entries[idx].mood = currentMood;
  entries[idx].tags = [...currentTags];
  save();
  renderAll();
  const badge = document.getElementById('saved-badge');
  badge.className = 'saved-badge show';
  setTimeout(() => badge.className = 'saved-badge', 2000);
}

/* 削除 */
function deleteEntry() {
  if (!currentId) return;
  if (!confirm('この記録を削除しますか？')) return;
  entries = entries.filter(e => e.id !== currentId);
  currentId = null;
  save();
  renderAll();
  document.getElementById('editor').style.display = 'none';
  document.getElementById('empty-state').style.display = 'block';
}

/* AIコメント */
async function getAIComment() {
  if (!apiKey) { alert('画面下部にOpenAI APIキーを入力してください。'); return; }
  saveEntry();
  const entry = entries.find(e => e.id === currentId);
  if (!entry) return;
  if (!entry.reflection && !entry.learning && !entry.gratitude) { alert('何か記入してから押してください。'); return; }
  const aiDiv = document.getElementById('ai-comment');
  const aiBubble = document.getElementById('ai-bubble');
  aiDiv.className = 'ai-comment visible';
  aiBubble.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
  const moodText = entry.mood ? `気分スコア: ${entry.mood}/5（${MOOD_LABELS[entry.mood]}）` : '';
  const tagsText = entry.tags?.length ? `テーマ: ${entry.tags.join('・')}` : '';
  const prompt = `あなたは丁寧で洞察力のあるコーチです。
以下は私の今日の日記です。
${moodText}
${tagsText}

【振り返り】
${entry.reflection || '（未記入）'}

【学び】
${entry.learning || '（未記入）'}

【感謝】
${entry.gratitude || '（未記入）'}

この日記を読んで、以下をシンプルにしてください：
1. 一言の共感・気づき（1〜2文）
2. 学びや気づきをより深めるための問いかけ（2〜3個、「？」で終わる）
3. 明日への小さな示唆（1文）

語調は温かく、簡潔に。押しつけがましくなく。`;
  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({ model: 'gpt-4o-mini', messages: [{ role: 'user', content: prompt }], temperature: 0.7, max_tokens: 600 })
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.error?.message || res.statusText); }
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content || '（応答を取得できませんでした）';
    aiBubble.textContent = text;
    const idx = entries.findIndex(e => e.id === currentId);
    if (idx >= 0) { entries[idx].aiComment = text; save(); }
  } catch(e) { aiBubble.textContent = `エラー: ${e.message}`; }
}

/* 月次サマリー */
async function getMonthlySummary() {
  if (!apiKey) { alert('画面下部にOpenAI APIキーを入力してください。'); return; }
  const now = new Date();
  const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthEntries = entries.filter(e => e.date.startsWith(ym));
  if (monthEntries.length < 2) { alert('今月の記録が2件以上ないとサマリーを作れません。'); return; }
  const summaryDiv = document.getElementById('monthly-summary');
  const summaryContent = document.getElementById('monthly-summary-content');
  summaryDiv.className = 'monthly-summary visible';
  summaryContent.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
  const digest = monthEntries.slice(0, 15).map(e =>
    `[${e.date}] 振り返り:${(e.reflection||'').slice(0,80)} / 学び:${(e.learning||'').slice(0,60)} / 気分:${e.mood||'未記録'}`
  ).join('\n');
  const prompt = `以下は私の今月（${ym}）の日記の抜粋です。

${digest}

この月を振り返って：
1. 今月のあなたのテーマや特徴（2〜3文）
2. 成長や変化のポイント（2点）
3. 来月への問いかけ（1〜2個）

温かく、洞察的に。300字以内で。`;
  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({ model: 'gpt-4o-mini', messages: [{ role: 'user', content: prompt }], temperature: 0.7, max_tokens: 500 })
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.error?.message || res.statusText); }
    const data = await res.json();
    summaryContent.textContent = data.choices?.[0]?.message?.content || '（応答を取得できませんでした）';
  } catch(e) { summaryContent.textContent = `エラー: ${e.message}`; }
}

init();
</script>
