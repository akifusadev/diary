<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日記</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1714;
    --ink-light: #4a4540;
    --ink-faint: #8a847e;
    --paper: #faf7f2;
    --paper-warm: #f2ede4;
    --paper-border: #e0d8cc;
    --accent: #8b4e2a;
    --accent-light: #c4855a;
    --ai-bg: #f0ece4;
    --ai-border: #c8bfb0;
    --success: #3a6e4e;
    --entry-bg: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.8;
  }
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
  }
  /* サイドバー */
  .sidebar {
    background: var(--paper-warm);
    border-right: 1px solid var(--paper-border);
    padding: 2rem 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .sidebar-header {
    padding: 0 1.5rem 1.5rem;
    border-bottom: 1px solid var(--paper-border);
  }
  .app-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--ink);
  }
  .app-subtitle {
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }
  .new-btn {
    margin: 1.25rem 1.5rem 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--accent);
    color: #faf7f2;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    transition: background 0.2s;
    width: calc(100% - 3rem);
  }
  .new-btn:hover { background: #7a4325; }
  .entries-list { padding: 1rem 0; flex: 1; }
  .entries-label {
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0 1.5rem;
    margin-bottom: 8px;
  }
  .entry-item {
    padding: 10px 1.5rem;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .entry-item:hover { background: rgba(139,78,42,0.06); }
  .entry-item.active {
    background: rgba(139,78,42,0.08);
    border-left-color: var(--accent);
  }
  .entry-date {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-light);
  }
  .entry-preview {
    font-size: 11px;
    color: var(--ink-faint);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .empty-list {
    padding: 1rem 1.5rem;
    font-size: 12px;
    color: var(--ink-faint);
  }
  /* メインエリア */
  .main {
    padding: 3rem 4rem;
    max-width: 780px;
  }
  .date-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 2.5rem;
  }
  .date-display {
    font-family: 'Shippori Mincho', serif;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .date-day {
    font-size: 14px;
    color: var(--ink-faint);
  }
  /* セクション */
  .section {
    margin-bottom: 2rem;
  }
  .section-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .section-label .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-light);
    flex-shrink: 0;
  }
  textarea {
    width: 100%;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    line-height: 1.8;
    color: var(--ink);
    background: var(--entry-bg);
    border: 1px solid var(--paper-border);
    border-radius: 6px;
    padding: 14px 16px;
    resize: vertical;
    min-height: 100px;
    outline: none;
    transition: border-color 0.2s;
    caret-color: var(--accent);
  }
  textarea:focus { border-color: var(--accent-light); }
  textarea::placeholder { color: var(--ink-faint); }
  /* ボタン行 */
  .actions {
    display: flex;
    gap: 12px;
    margin-top: 2rem;
    align-items: center;
  }
  .btn-save {
    padding: 11px 24px;
    background: var(--accent);
    color: #faf7f2;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    transition: background 0.2s;
  }
  .btn-save:hover { background: #7a4325; }
  .btn-ai {
    padding: 11px 20px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent-light);
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-ai:hover { background: rgba(139,78,42,0.06); }
  .btn-delete {
    margin-left: auto;
    padding: 11px 16px;
    background: transparent;
    color: var(--ink-faint);
    border: 1px solid var(--paper-border);
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
  }
  .btn-delete:hover { color: #c0392b; border-color: #c0392b; }
  /* AIコメントエリア */
  .ai-comment {
    margin-top: 2.5rem;
    border-top: 1px solid var(--paper-border);
    padding-top: 2rem;
    display: none;
  }
  .ai-comment.visible { display: block; }
  .ai-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ai-label::before {
    content: '';
    display: inline-block;
    width: 20px;
    height: 1px;
    background: var(--ink-faint);
  }
  .ai-bubble {
    background: var(--ai-bg);
    border: 1px solid var(--ai-border);
    border-radius: 8px;
    padding: 1.25rem 1.5rem;
    font-size: 14px;
    line-height: 1.9;
    color: var(--ink-light);
    white-space: pre-wrap;
  }
  .loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }
  .loading-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--ink-faint);
    animation: blink 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%,80%,100% { opacity: 0.2; }
    40% { opacity: 1; }
  }
  /* APIキー設定 */
  .apikey-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--paper-warm);
    border-top: 1px solid var(--paper-border);
    padding: 10px 2rem;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    z-index: 100;
  }
  .apikey-bar label { color: var(--ink-faint); white-space: nowrap; }
  .apikey-bar input {

    flex: 1;
    max-width: 400px;
    padding: 6px 10px;
    border: 1px solid var(--paper-border);
    border-radius: 4px;
    font-size: 12px;
    background: var(--paper);
    color: var(--ink);
    font-family: monospace;
  }
  .apikey-status {
    font-size: 11px;
    color: var(--ink-faint);
  }
  .apikey-status.ok { color: var(--success); }
  /* 空の状態 */
  .empty-state {
    padding: 5rem 0;
    text-align: center;
    color: var(--ink-faint);
  }
  .empty-state .big { font-family: 'Shippori Mincho', serif; font-size: 48px; margin-bottom: 1rem; opacity: 0.3; }
  .empty-state p { font-size: 14px; }
  /* 保存済み閲覧モード */
  .view-mode .section-text {
    font-size: 15px;
    line-height: 1.9;
    color: var(--ink-light);
    background: var(--entry-bg);
    border: 1px solid var(--paper-border);
    border-radius: 6px;
    padding: 14px 16px;
    min-height: 60px;
    white-space: pre-wrap;
  }
  .saved-badge {
    font-size: 11px;
    color: var(--success);
    display: none;
  }
  .saved-badge.show { display: inline; }
</style>
</head>
<body>

<div class="layout">
  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="app-title">振り返り日記</div>
      <div class="app-subtitle">reflection · learning · gratitude</div>
    </div>
    <button class="new-btn" onclick="newEntry()">＋ 今日の記録</button>
    <div class="entries-list">
      <div class="entries-label">過去の記録</div>
      <div id="entries-list"></div>
    </div>
  </aside>

  <!-- メイン -->
  <main class="main" id="main-area">
    <div class="empty-state" id="empty-state">
      <div class="big">日</div>
      <p>「今日の記録」から記入を始めてください</p>
    </div>

    <div id="editor" style="display:none;">
      <div class="date-header">
        <div class="date-display" id="entry-date-display"></div>
        <div class="date-day" id="entry-day-display"></div>
        <span class="saved-badge" id="saved-badge">✓ 保存済み</span>
      </div>

      <div class="section">
        <div class="section-label"><span class="dot"></span>振り返り ― 今日はどんな一日でしたか？</div>
        <textarea id="field-reflection" rows="5" placeholder="仕事・出来事・感情など、頭に浮かぶことをそのまま書いてください。"></textarea>
      </div>

      <div class="section">
        <div class="section-label"><span class="dot"></span>学び ― 気づいたこと・得たこと</div>
        <textarea id="field-learning" rows="4" placeholder="小さな気づきでも構いません。何かを「知った」「理解した」瞬間は？"></textarea>
      </div>

      <div class="section">
        <div class="section-label"><span class="dot"></span>感謝 ― ありがたかったこと</div>
        <textarea id="field-gratitude" rows="3" placeholder="人・出来事・環境・自分自身、何でも。"></textarea>
      </div>

      <div class="actions">
        <button class="btn-save" onclick="saveEntry()">保存</button>
        <button class="btn-ai" onclick="getAIComment()">
          ✦ AIに問いかけてもらう
        </button>
        <button class="btn-delete" onclick="deleteEntry()">削除</button>
      </div>

      <div class="ai-comment" id="ai-comment">
        <div class="ai-label">AIからの問いかけ</div>
        <div class="ai-bubble" id="ai-bubble"></div>
      </div>
    </div>
  </main>
</div>

<!-- APIキーバー -->
<div class="apikey-bar">
  <label>Gemini API Key：</label>
  <input type="password" id="apikey-input" placeholder="sk-..." oninput="saveApiKey(this.value)" />
  <span class="apikey-status" id="apikey-status">未設定</span>
</div>

<script>
const DAYS = ['日','月','火','水','木','金','土'];
let entries = JSON.parse(localStorage.getItem('diary_entries') || '[]');
let currentId = null;
let apiKey = localStorage.getItem('diary_apikey') || '';

function init() {
  if (apiKey) {
    const el = document.getElementById('apikey-input');
    el.value = apiKey;
    document.getElementById('apikey-status').textContent = '設定済み';
    document.getElementById('apikey-status').className = 'apikey-status ok';
  }
  renderList();
}

function saveApiKey(val) {
  apiKey = val.trim();
  localStorage.setItem('diary_apikey', apiKey);
  const status = document.getElementById('apikey-status');
  if (apiKey) {
    status.textContent = '設定済み';
    status.className = 'apikey-status ok';
  } else {
    status.textContent = '未設定';
    status.className = 'apikey-status';
  }
}

function newEntry() {
  const today = new Date();
  const dateStr = today.toISOString().split('T')[0];
  // 同日エントリがあれば開く
  const existing = entries.find(e => e.date === dateStr);
  if (existing) { openEntry(existing.id); return; }
  const id = 'e_' + Date.now();
  const entry = { id, date: dateStr, reflection: '', learning: '', gratitude: '', aiComment: '' };
  entries.unshift(entry);
  save();
  renderList();
  openEntry(id);
}

function openEntry(id) {
  currentId = id;
  const entry = entries.find(e => e.id === id);
  if (!entry) return;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('editor').style.display = 'block';
  const d = new Date(entry.date + 'T00:00:00');
  document.getElementById('entry-date-display').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  document.getElementById('entry-day-display').textContent = `（${DAYS[d.getDay()]}）`;
  document.getElementById('field-reflection').value = entry.reflection || '';
  document.getElementById('field-learning').value = entry.learning || '';
  document.getElementById('field-gratitude').value = entry.gratitude || '';
  const savedBadge = document.getElementById('saved-badge');
  savedBadge.className = 'saved-badge';
  // AIコメント
  const aiDiv = document.getElementById('ai-comment');
  const aiBubble = document.getElementById('ai-bubble');
  if (entry.aiComment) {
    aiBubble.textContent = entry.aiComment;
    aiDiv.className = 'ai-comment visible';
  } else {
    aiDiv.className = 'ai-comment';
    aiBubble.textContent = '';
  }
  // リスト選択
  document.querySelectorAll('.entry-item').forEach(el => el.classList.remove('active'));
  const listItem = document.querySelector(`[data-id="${id}"]`);
  if (listItem) listItem.classList.add('active');
}

function saveEntry() {
  if (!currentId) return;
  const idx = entries.findIndex(e => e.id === currentId);
  if (idx < 0) return;
  entries[idx].reflection = document.getElementById('field-reflection').value;
  entries[idx].learning = document.getElementById('field-learning').value;
  entries[idx].gratitude = document.getElementById('field-gratitude').value;
  save();
  renderList();
  const badge = document.getElementById('saved-badge');
  badge.className = 'saved-badge show';
  setTimeout(() => badge.className = 'saved-badge', 2000);
}

function deleteEntry() {
  if (!currentId) return;
  if (!confirm('この記録を削除しますか？')) return;
  entries = entries.filter(e => e.id !== currentId);
  currentId = null;
  save();
  renderList();
  document.getElementById('editor').style.display = 'none';
  document.getElementById('empty-state').style.display = 'block';
}

function save() {
  localStorage.setItem('diary_entries', JSON.stringify(entries));
}

function renderList() {
  const el = document.getElementById('entries-list');
  if (entries.length === 0) {
    el.innerHTML = '<div class="empty-list">記録がまだありません</div>';
    return;
  }
  el.innerHTML = entries.map(e => {
    const d = new Date(e.date + 'T00:00:00');
    const label = `${d.getMonth()+1}/${d.getDate()}（${DAYS[d.getDay()]}）`;
    const preview = (e.reflection || e.learning || e.gratitude || '').slice(0, 30);
    return `<div class="entry-item${e.id === currentId ? ' active' : ''}" data-id="${e.id}" onclick="openEntry('${e.id}')">
      <div class="entry-date">${label}</div>
      <div class="entry-preview">${preview || '（未記入）'}</div>
    </div>`;
  }).join('');
}

async function getAIComment() {
  if (!apiKey) {
    alert('画面下部にGemini APIキーを入力してください。');
    return;
  }
  // 先に保存
  saveEntry();
  const entry = entries.find(e => e.id === currentId);
  if (!entry) return;
  const hasContent = entry.reflection || entry.learning || entry.gratitude;
  if (!hasContent) {
    alert('何か記入してから「AIに問いかけてもらう」を押してください。');
    return;
  }

  const aiDiv = document.getElementById('ai-comment');
  const aiBubble = document.getElementById('ai-bubble');
  aiDiv.className = 'ai-comment visible';
  aiBubble.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';

  const prompt = `あなたは丁寧で洞察力のあるコーチです。
以下は私の今日の日記です。

【振り返り】
${entry.reflection || '（未記入）'}

【学び】
${entry.learning || '（未記入）'}

【感謝】
${entry.gratitude || '（未記入）'}

この日記を読んで、以下をシンプルにしてください：
1. 一言の共感・気づき（1〜2文）
2. 学びや気づきをより深めるための問いかけ（2〜3個、「？」で終わる）
3. 明日への小さな示唆（1文）

語調は温かく、簡潔に。押しつけがましくなく。`;

  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.7,
        max_tokens: 600
      })
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || res.statusText);
    }
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content || '（応答を取得できませんでした）';
    aiBubble.textContent = text;
    // 保存
    const idx = entries.findIndex(e => e.id === currentId);
    if (idx >= 0) { entries[idx].aiComment = text; save(); }
  } catch(e) {
    aiBubble.textContent = `エラー: ${e.message}\n\nAPIキーや通信環境を確認してください。`;
  }
}

init();
</script>
</body>
</html>
